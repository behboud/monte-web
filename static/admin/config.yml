backend:
  name: github
  repo: behboud/monte-web
  branch: main # Branch to update (optional; defaults to master)
  base_url: https://sveltia-cms-auth.b-kalantary.workers.dev
  commit_messages:
    create: Create {{collection}} {{slug}} {{author-name}}
    update: Update {{collection}} {{slug}} {{author-name}}
    delete: Delete {{collection}} {{slug}} {{author-name}}
    uploadMedia: Upload {{path}} {{author-name}}
    deleteMedia: Delete {{path}} {{author-name}}
    openAuthoring: "{{message}} {{author-name}}"
site_url: "https://behboud.github.io/monte-web/"
media_folder: /assets/images
public_folder: /images
display_url: "https://behboud.github.io/monte-web/"
logo_url: /monte-web/images/logo-montessorischulegilching.gif
locale: "de"
collections:
  - name: "site_settings"
    label: "Site Settings"
    files:
      - file: "hugo.toml"
        label: Site Config
        name: config
        editor:
          preview: false
        fields:
          - { label: Site Title for Browser Tab, name: title, widget: string }
  - name: "aktuelles"
    label: "Aktuelles"
    folder: "content/de/aktuelles"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Datum Veröffentlichung", name: "publishdate", widget: "datetime" }
      - { label: "Stimmungsbild", name: "image", widget: "image" }
      - { label: "Author", name: "author", widget: "string" }
      - name: "tags"
        widget: "select"
        label: "Tags"
        multiple: true
        create: true
        options: ["Mitglieder", "Termin", "Projekt", "Verein"]
      - { label: "Inhalt", name: "body", widget: "markdown" }
      - { label: "Datum", name: "date", widget: "hidden", default: "{{now}}" }
  - name: "start"
    label: "Startseite"
    editor:
      preview: false
    files:
      - label: "Startseite"
        name: "index"
        file: "content/de/_index.md"
        fields:
          - label: "Banner"
            name: "banner"
            widget: "object"
            fields:
              - { label: "Titel", name: "title", widget: "string" }
              - { label: "Untertitel", name: "content", widget: "string", required: false }
              - { label: "Bild", name: "image", widget: "image" }
          - label: "Slider Gallery"
            name: "slider"
            widget: object
            fields:
              - label: "Bilder"
                name: "images"
                widget: image
                multiple: true
                allow_add: true
                default: []
          - { label: "Inhalt", name: "body", widget: "markdown", required: false }
  - name: "pages"
    label: "Einzelseiten"
    create: true
    folder: "content/de/pages"
    editor:
      preview: false
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Inhalt", name: "body", widget: "markdown" }
  - name: "speiseplan"
    label: "Speiseplan"
    editor:
      preview: false
    files:
      - file: "content/de/speiseplan/_index.md"
        label: "Speiseplan"
        name: "speiseplan"
        fields:
          - { label: "Titel", name: "title", widget: "string" }
          - { label: "Entwurf", name: "draft", widget: "boolean", required: false, default: false }
          - label: "Wochenplan"
            name: "meal_plan"
            widget: "object"
            fields:
              - { label: "Woche", name: "week_label", widget: "string" }
              - { label: "Heutiges Datum (Test)", name: "test_today", widget: "date", required: false, hint: "Nur für Hervorhebung von Heute" }
              - label: "Tage"
                name: "days"
                widget: "list"
                min: 1
                fields:
                  - { label: "Tag", name: "day", widget: "string" }
                  - { label: "Datum", name: "date", widget: "date", required: false }
                  - { label: "Hauptgericht", name: "main", widget: "string" }
                  - { label: "Beilage", name: "side", widget: "string", required: false }
                  - { label: "Nachtisch", name: "dessert", widget: "string", required: false }
                  - { label: "Getränk", name: "drink", widget: "string", required: false }
              - label: "Hinweise"
                name: "notes"
                widget: "list"
                required: false
                field: { label: "Hinweis", widget: "string" }
          - { label: "Mittagsverpflegung (Text)", name: "body", widget: "markdown" }
  - name: "kontakt_settings"
    label: "Kontakt & Social"
    editor:
      preview: false
    files:
      - file: "content/de/pages/kontakt.md"
        label: "Kontakt"
        name: "kontakt"
        fields:
          - { label: "Titel", name: "title", widget: "string" }
          - label: "Social Links"
            name: "social_links"
            widget: "list"
            required: false
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Icon (Font Awesome)", name: "icon", widget: "string" }
              - { label: "Link", name: "link", widget: "string" }
          - { label: "Inhalt", name: "body", widget: "markdown" }
  - name: "sections"
    label: "Bereiche"
    editor:
      preview: false
    files:
      - file: "content/de/schule/_index.md"
        label: "Schule & Aufnahme"
        name: "schule"
        fields:
          - { label: "Titel", name: "title", widget: "string" }
          - { label: "Beschreibung", name: "description", widget: "string", required: false }
          - { label: "Entwurf", name: "draft", widget: "boolean", required: false, default: false }
          - label: "Slider"
            name: "slider"
            widget: "object"
            required: false
            fields:
              - { label: "Aktivieren", name: "enable", widget: "boolean", required: false, default: false }
              - label: "Bilder"
                name: "images"
                widget: "list"
                required: false
                field: { label: "Bild", widget: "image" }
          - label: "Seitenübersicht (ein TOC)"
            name: "toc"
            widget: "object"
            required: false
            fields:
              - { label: "Titel", name: "title", widget: "string", required: false, default: "Seitenübersicht" }
              - label: "Bereiche"
                name: "sections"
                widget: "list"
                required: false
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Überschrift", name: "title", widget: "string", required: false }
                  - { label: "Inhalt", name: "content", widget: "markdown", required: false }
                  - label: "Unterpunkte"
                    name: "children"
                    widget: "list"
                    required: false
                    fields:
                      - { label: "Label", name: "label", widget: "string" }
                      - { label: "Überschrift", name: "title", widget: "string", required: false }
                      - { label: "Inhalt", name: "content", widget: "markdown", required: false }
          - { label: "Inhalt", name: "body", widget: "markdown" }
      - file: "content/de/elternengagement/_index.md"
        label: "Elternengagement"
        name: "elternengagement"
        fields:
          - { label: "Titel", name: "title", widget: "string" }
          - { label: "Beschreibung", name: "description", widget: "string", required: false }
          - { label: "Entwurf", name: "draft", widget: "boolean", required: false, default: false }
          - label: "Slider"
            name: "slider"
            widget: "object"
            required: false
            fields:
              - { label: "Aktivieren", name: "enable", widget: "boolean", required: false, default: false }
              - label: "Bilder"
                name: "images"
                widget: "list"
                required: false
                field: { label: "Bild", widget: "image" }
          - label: "Seitenübersicht (ein TOC)"
            name: "toc"
            widget: "object"
            required: false
            fields:
              - { label: "Titel", name: "title", widget: "string", required: false, default: "Seitenübersicht" }
              - label: "Bereiche"
                name: "sections"
                widget: "list"
                required: false
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Überschrift", name: "title", widget: "string", required: false }
                  - { label: "Inhalt", name: "content", widget: "markdown", required: false }
          - { label: "Inhalt", name: "body", widget: "markdown" }
      - file: "content/de/spenden/_index.md"
        label: "Spenden"
        name: "spenden"
        fields:
          - { label: "Titel", name: "title", widget: "string" }
          - { label: "Beschreibung", name: "description", widget: "string", required: false }
          - { label: "Entwurf", name: "draft", widget: "boolean", required: false, default: false }
          - { label: "Überschrift", name: "uberschrift", widget: "string", required: false }
          - label: "Förderer/Spendenliste"
            name: "spenden"
            widget: "list"
            required: false
            fields:
              - { label: "Name", name: "title", widget: "string" }
              - { label: "Bild", name: "image", widget: "image" }
              - { label: "Text", name: "content", widget: "text" }
          - { label: "Inhalt", name: "body", widget: "markdown" }
      - file: "content/de/verein/_index.md"
        label: "Verein"
        name: "verein"
        fields:
          - { label: "Titel", name: "title", widget: "string" }
          - { label: "Entwurf", name: "draft", widget: "boolean", required: false, default: false }
          - label: "Slider"
            name: "slider"
            widget: "object"
            required: false
            fields:
              - { label: "Aktivieren", name: "enable", widget: "boolean", required: false, default: false }
              - label: "Bilder"
                name: "images"
                widget: "list"
                required: false
                field: { label: "Bild", widget: "image" }
          - label: "Seitenübersicht (ein TOC)"
            name: "toc"
            widget: "object"
            required: false
            fields:
              - { label: "Titel", name: "title", widget: "string", required: false, default: "Seitenübersicht" }
              - label: "Bereiche"
                name: "sections"
                widget: "list"
                required: false
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Überschrift", name: "title", widget: "string", required: false }
                  - { label: "Inhalt", name: "content", widget: "markdown", required: false }
          - { label: "Inhalt", name: "body", widget: "markdown" }
