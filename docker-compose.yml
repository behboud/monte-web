services:
  wordpress:
    build:
      context: .
      dockerfile: Dockerfile.wordpress
      args:
        - NODE_VERSION=20
    container_name: monte-wordpress
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}
    volumes:
      - ./wp-content:/var/www/html/wp-content
      - ./wp-config.php:/var/www/html/wp-config.php
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - monte-network

  db:
    image: mysql:8.0
    container_name: monte-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monte-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: monte-phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      - db
    networks:
      - monte-network

  node:
    image: node:20-alpine
    container_name: monte-node
    working_dir: /app
    volumes:
      - ./wp-content/themes/monte-theme:/app
      - node_modules:/app/node_modules
    command: sh -c "if [ -f package.json ]; then npm install && npm run watch; else tail -f /dev/null; fi"
    networks:
      - monte-network

volumes:
  db_data:
    driver: local
  node_modules:

networks:
  monte-network:
    driver: bridge
