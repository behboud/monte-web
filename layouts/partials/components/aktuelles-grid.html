{{ $pages := .Pages }}
{{ $limit := .Limit }}
{{ $itemClass := .ItemClass | default "basis-1/2 lg:basis-1/3 xl:basis-1/4 mb-2 pr-2" }}

{{ if $limit }}
  {{ $pages = first $limit $pages }}
{{ end }}


<div class="flex flex-row flex-wrap">
  {{ range $pages }}
    <div class="{{ $itemClass }}">
      {{ partial "components/aktuelles-card" . }}
    </div>
  {{ end }}
</div>
