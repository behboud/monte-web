######################## default configuration ####################
baseURL = "https://behboud.github.io/monte-web/"
title = "Montessori Schule Gilching (München West)"
timeZone = "Europe/Berlin"
summaryLength = 10
hasCJKLanguage = false
defaultContentLanguage = "de"

########################### Services #############################
[services]
  [services.disqus]
    shortname = "themefisher-template"

########################## Permalinks ############################
[permalinks.page]
  pages = "/:slugorcontentbasename/"

########################## Pagination ############################
[pagination]
  disableAliases = false
  pagerSize = 10
  path = "page"

############################# Build ##############################
[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = "assets/notwatching/hugo_stats\\.json"
    target = "css"
  [[build.cachebusters]]
    source = "(postcss|tailwind)\\.config\\.js"
    target = "css"

############################# Module #############################
[module]
  [module.hugoVersion]
    extended = true
    min = "0.141.0"

  [[module.mounts]]
    source = "assets"
    target = "assets"

  [[module.mounts]]
    disableWatch = true
    source = "hugo_stats.json"
    target = "assets/notwatching/hugo_stats.json"

  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/search"

  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/pwa"

  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/images"

  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/videos"

  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/icons/font-awesome"

  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/gzip-caching"

  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/accordion"

  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/table-of-contents"

  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/tab"

  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/modal"

  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/gallery-slider"

  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/components/preloader"

  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/components/social-share"

  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/components/cookie-consent"

  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/components/announcement"

  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/components/custom-script"

  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/components/render-link"

  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/shortcodes/button"

  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/shortcodes/notice"

  [[module.imports]]
    path = "github.com/gethugothemes/hugo-modules/seo-tools/basic-seo"

############################# Related #############################
[related]
  threshold = 80
  includeNewer = true
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "date"
    weight = 10

############################# Outputs ############################
[outputs]
  home = ["HTML", "RSS", "WebAppManifest", "SearchIndex"]

############################# Imaging ############################
[imaging]
  quality = 80
  resampleFilter = "Lanczos"

############################ Caches ##############################
[caches]
  [caches.images]
    dir = ":resourceDir/_gen"
    maxAge = "720h"
  [caches.assets]
    dir = ":resourceDir/_gen"
    maxAge = "720h"

############################ Markup ##############################
[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    style = "monokai"
    lineNumbersInTable = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 5
    ordered = true

########################### Media types ###########################
[mediaTypes]
  [mediaTypes."application/manifest+json"]
    suffixes = ["webmanifest"]

########################### Output Format ##########################
[outputFormats]
  [outputFormats.WebAppManifest]
    mediaType = "application/manifest+json"
    rel = "manifest"
  [outputFormats.SearchIndex]
    mediaType = "application/json"
    baseName = "searchindex"
    isPlainText = true
    notAlternative = true

########################### Languages ##############################
[languages]
  [languages.de]
    languageName = "Deutsch"
    languageCode = "de-DE"
    contentDir = "content/de"
    weight = 1

