############################# Params ###############################
[params]
  favicon = "images/favicon-96x96.png"
  logo = "images/logo-montessorischulegilching.gif"
  logo_width = "88px"
  logo_height = "118px"
  logo_webp = true
  logo_text = "Montessori Schule Gilching"
  header_image_banner = "images/header-zaun.jpg"
  navbar_fixed = true
  theme_switcher = false
  theme_default = "light"
  mainSections = ["aktuelles"]
  contact_form_action = "#"
  custom_script = ""
  copyright = "© Montessori Schule Gilching (Münchner Westen)"

  [params.preloader]
    enable = false
    preloader = ""

  [params.navigation_button]
    enable = false
    label = "Kontakt"
    link = "contact"

  [params.search]
    enable = false
    primary_color = "#121212"
    include_sections = ["aktuelles"]
    show_image = true
    show_description = true
    show_tags = true
    show_categories = true

  [params.announcement]
    enable = false
    expire_days = 7
    content = "You must replace the **baseURL** in **hugo.toml** file when deploying, you can manage this announcement from the **params.toml** file."

  [params.metadata]
    keywords = ["Montessori", "Grundschule", "Schule", "Gilching", "München", "Westen"]
    description = "Montessori Schule Gilching (München Westen)"
    author = "Monrtessori Schule Gilching"

  [params.site_verification]
    google = ""
    bing = ""
    baidu = ""
    facebook = ""
    mastodon = ""

  [params.cookies]
    enable = false
    expire_days = 60
    content = "This site uses cookies. By continuing to use this website, you agree to their use."
    button = "I Accept"

  [params.mermaid]
    js_url = "https://cdn.jsdelivr.net/npm/mermaid@latest/dist/mermaid.esm.min.mjs"

  [params.widgets]
    sidebar = ["categories", "tags"]

  [params.google_map]
